version: "2"
linters:
  default: standard
  enable:
    - bodyclose
    - prealloc
    - unparam
  settings:
    staticcheck:
      dot-import-whitelist:
        - fmt
        - github.com/onsi/ginkgo/v2
        - github.com/onsi/gomega
  exclusions:
    paths:
      - generated.*\.go
      - client
      - vendor

formatters:
  enable:
    - gofumpt
    - goimports

issues:
  max-same-issues: 100

run:
  timeout: 10m
